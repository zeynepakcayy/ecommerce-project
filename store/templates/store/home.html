<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>E-Ticaret</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        h1 { color: #333; }
        .products { display: flex; flex-wrap: wrap; gap: 20px; }
        .card { background: white; border-radius: 8px; padding: 16px; width: 200px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .card h3 { margin: 0 0 8px; font-size: 16px; }
        .card p { margin: 0; color: #e44; font-weight: bold; }
        .card a { display: inline-block; margin-top: 10px; text-decoration: none; color: #0077cc; }
    </style>
</head>
<body>
    <h1>🛒 Mağaza</h1>
    <div class="products">
        {% for product in products %}
        <div class="card">
            {% if product.image %}
                <img src="{{ product.image.url }}" width="100%" style="border-radius:4px">
            {% endif %}
            <h3>{{ product.name }}</h3>
            <p>{{ product.price }} ₺</p>
            <a href="{% url 'product_detail' product.pk %}">Detay →</a>
        </div>
        {% empty %}
            <p>Henüz ürün yok. Admin panelinden ekleyebilirsin.</p>
        {% endfor %}
    </div>
</body>
</html>
